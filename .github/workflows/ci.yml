name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build gateway
        run: dotnet build src/PcccGateway/PcccGateway.csproj -c Release

      - name: Run unit tests
        run: dotnet test tests/PcccGateway.Tests/PcccGateway.Tests.csproj -c Release --verbosity normal
